        <h1 style="font-family:'Share Tech Mono',monospace;font-size:24px;letter-spacing:2px;">HUMANOID ATLAS</h1>
        <p>The comprehensive, open-source database of the humanoid robot industry. Compare OEMs, hardware supply chain, AI software stack, and human-robot interaction design.</p>
        <p><strong>This interactive application requires JavaScript to run.</strong> Please enable JavaScript to access the full experience.</p>

        <h2>Humanoid Robot OEMs (29+)</h2>
        <p>Tesla (Optimus), Figure (02/03), 1X Technologies (NEO), Unitree (G1/H1), Agility Robotics (Digit), Boston Dynamics (Atlas), Apptronik (Apollo), Sanctuary AI (Phoenix), NEURA Robotics (4NE-1), Fourier (GR-2), XPeng (Iron), UBTech (Walker S2), Kepler (Forerunner K2), AgiBot (A2), Sunday Robotics (Memo), Dexmate (Vega), Astribot, Dobot, Fauna Robotics, Vanar Robots, and more.</p>

        <h2>Hardware Supply Chain (41+ suppliers, 10 component categories)</h2>
        <p><strong>Motors:</strong> Maxon, Allied Motion, ThinGap, T-Motor. <strong>Reducers:</strong> Harmonic Drive, LKGEAR, Leaderdrive. <strong>Compute:</strong> NVIDIA (Jetson Orin/Thor), Intel, Qualcomm. <strong>Batteries:</strong> Panasonic, CATL, Samsung SDI, Molicel. <strong>Sensors:</strong> Intel RealSense, Livox LiDAR, Sony image sensors. <strong>Actuators:</strong> Rotary and linear modules combining motors, reducers, encoders, and torque sensors. <strong>Screws:</strong> Planetary roller screws — a key supply chain bottleneck. <strong>Hands:</strong> 3-finger grippers to 22-DOF anthropomorphic hands. <strong>Bearings:</strong> Cross-roller and ball bearings. <strong>PCBs:</strong> Motor drivers, power management, analog ICs.</p>

        <h2>VLA Models (19)</h2>
        <p>Vision-Language-Action models that unify perception, language, and robot control. Tracked: GR00T N1 (NVIDIA), pi0/pi0.5/pi0.6 (Physical Intelligence), Helix 02 (Figure), Gemini Robotics (Google DeepMind), OpenVLA (Stanford/Berkeley), UnifoLM-VLA (Unitree), Skild Brain, MolmoAct (Ai2), and more.</p>

        <h2>Reward Models (10)</h2>
        <p>Models that score robot task performance for RL training. Tracked: Robometer (USC/MIT/NVIDIA), RoboReward (Stanford/Berkeley), SARM, VLAC, Robo-Dopamine, GVL, TOPReward, Eureka, RoboCLIP, RL-VLM-F.</p>

        <h2>World Models (19)</h2>
        <p>Models that simulate how the world evolves in response to robot actions. Tracked: DreamDojo (NVIDIA), 1X World Model, Dreamer V4, NVIDIA Cosmos, V-JEPA 2 (Meta), Genie 2 (DeepMind), UniSim, DayDreamer, DIAMOND, IRIS, NeRD, Field AI, Rhoda AI FutureVision, and more.</p>

        <h2>Visualization Tools (10)</h2>
        <p>Tools for debugging and inspecting robot data. Tracked: Foxglove, Rerun, Formant, RViz2, MeshCat, Viser, Vuer, PlotJuggler, DataTamer, Roboto AI.</p>

        <h2>Display & Head Designs (17)</h2>
        <p>How humanoid robots see the world and communicate with humans. 5 face types tracked: OLED Screen (Tesla Optimus, XPeng Iron), Status Screen (Fourier GR-2, AgiBot A2, NEURA 4NE-1, Apollo), LED Indicator (Digit, Unitree G1, 1X NEO, Atlas), No Display (Phoenix, Kepler, Walker S2, H1, Vega), Concealed (Figure 02, Sunday Memo).</p>

        <p style="margin-top:40px;color:#6b6b6b;font-size:14px;">Data sourced from company websites, technical papers, SEC filings, and founder questionnaires. Created by <a href="https://x.com/JulianSaks">Julian Saks</a>. Open source on <a href="https://github.com/kingjulio8238/humanoid-atlas">GitHub</a>.</p>

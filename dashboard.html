<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas CLI — Live Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e8;
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto; padding: 40px 24px;
  }

  header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 36px;
  }

  header .logo {
    width: 42px; height: 42px; border-radius: 10px;
    background: linear-gradient(135deg, #6366f1, #a78bfa);
    display: grid; place-items: center; font-size: 20px; font-weight: 700;
    color: #fff; font-family: 'JetBrains Mono', monospace;
  }

  header h1 {
    font-size: 22px; font-weight: 700; letter-spacing: -.3px;
  }

  header h1 span { color: #818cf8; }

  .pulse-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #34d399; margin-left: auto;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: .4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }

  .refresh-info {
    font-size: 12px; color: #555; margin-left: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ---------- stat cards ---------- */
  .stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    margin-bottom: 32px;
  }

  .card {
    background: #111119; border: 1px solid #1e1e2e; border-radius: 14px;
    padding: 24px; position: relative; overflow: hidden;
  }

  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, #6366f1, #a78bfa);
    opacity: .6;
  }

  .card .label {
    font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
    color: #6b7280; margin-bottom: 8px;
  }

  .card .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 36px; font-weight: 700; color: #fff;
  }

  .card .sub {
    font-size: 13px; color: #6b7280; margin-top: 4px;
  }

  /* ---------- sections ---------- */
  .section {
    background: #111119; border: 1px solid #1e1e2e; border-radius: 14px;
    padding: 28px; margin-bottom: 24px;
  }

  .section h2 {
    font-size: 15px; font-weight: 600; margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }

  .section h2 .icon { font-size: 18px; }

  /* bar chart */
  .bar-row {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 10px; font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
  }

  .bar-label {
    width: 260px; text-align: right; color: #9ca3af;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex-shrink: 0;
  }

  .bar-track {
    flex: 1; height: 22px; background: #1a1a28; border-radius: 4px;
    overflow: hidden; position: relative;
  }

  .bar-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, #6366f1, #818cf8);
    transition: width .6s ease;
    min-width: 2px;
  }

  .bar-count {
    width: 40px; color: #d1d5db; font-weight: 600; text-align: right;
    flex-shrink: 0;
  }

  /* sparkline area */
  .spark-container {
    width: 100%; height: 160px; position: relative;
  }

  .spark-container svg { width: 100%; height: 100%; }

  .spark-container .axis-label {
    position: absolute; font-size: 10px; color: #555;
    font-family: 'JetBrains Mono', monospace;
  }

  /* loading shimmer */
  .shimmer {
    background: linear-gradient(90deg, #1a1a28 25%, #252536 50%, #1a1a28 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px; height: 22px; margin-bottom: 10px;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .method-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 1px 5px; border-radius: 3px; margin-right: 4px;
  }

  .method-GET  { background: #064e3b; color: #34d399; }
  .method-POST { background: #312e81; color: #a5b4fc; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="container">

  <header>
    <div class="logo">A</div>
    <h1>Atlas CLI <span>Dashboard</span></h1>
    <div class="pulse-dot"></div>
    <span class="refresh-info" id="lastUpdate">polling…</span>
  </header>

  <!-- top-line stats -->
  <div class="stats">
    <div class="card">
      <div class="label">NPM Downloads — Last 7 Days</div>
      <div class="value" id="weeklyDl">—</div>
      <div class="sub" id="weeklyRange"></div>
    </div>
    <div class="card">
      <div class="label">NPM Downloads — Last 30 Days</div>
      <div class="value" id="monthlyDl">—</div>
      <div class="sub" id="monthlyRange"></div>
    </div>
    <div class="card">
      <div class="label">Total API Calls</div>
      <div class="value" id="totalApi">—</div>
      <div class="sub" id="endpointCount"></div>
    </div>
  </div>

  <!-- sparkline -->
  <div class="section">
    <h2><span class="icon">📈</span> Daily NPM Downloads (Last 30 Days)</h2>
    <div class="spark-container" id="sparkWrap"></div>
  </div>

  <!-- endpoint bars -->
  <div class="section">
    <h2><span class="icon">⚡</span> API Endpoint Usage</h2>
    <div id="endpointBars"></div>
  </div>

</div>

<script>
const NPM_WEEKLY  = 'https://api.npmjs.org/downloads/point/last-week/@kingjulio8238/atlas-cli';
const NPM_RANGE   = 'https://api.npmjs.org/downloads/range/last-month/@kingjulio8238/atlas-cli';
const API_USAGE   = '/api/usage';
const POLL_MS     = 60_000;

const $ = id => document.getElementById(id);

/* ---- fetch helpers ---- */
async function json(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

/* ---- sparkline SVG ---- */
function renderSpark(days) {
  const wrap = $('sparkWrap');
  const W = wrap.clientWidth, H = 150;
  const max = Math.max(...days.map(d => d.downloads), 1);
  const n = days.length;
  const px = i => (i / (n - 1)) * W;
  const py = d => H - (d / max) * (H - 20) - 10;

  const pts = days.map((d, i) => `${px(i)},${py(d.downloads)}`).join(' ');
  const areaPts = `0,${H} ${pts} ${W},${H}`;

  wrap.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="gfill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#6366f1" stop-opacity=".35"/>
          <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <polygon points="${areaPts}" fill="url(#gfill)"/>
      <polyline points="${pts}" fill="none" stroke="#818cf8" stroke-width="2" stroke-linejoin="round"/>
      ${days.map((d, i) => `<circle cx="${px(i)}" cy="${py(d.downloads)}" r="3" fill="#a78bfa" opacity="${d.downloads ? 1 : .25}">
        <title>${d.day}: ${d.downloads}</title>
      </circle>`).join('')}
    </svg>
    <span class="axis-label" style="bottom:2px;left:4px">${days[0]?.day?.slice(5)}</span>
    <span class="axis-label" style="bottom:2px;right:4px">${days[n-1]?.day?.slice(5)}</span>
    <span class="axis-label" style="top:0;right:4px">${max}</span>
  `;
}

/* ---- endpoint bar chart ---- */
function renderBars(endpoints) {
  const sorted = Object.entries(endpoints).sort((a, b) => b[1] - a[1]);
  const max = sorted[0]?.[1] || 1;
  const container = $('endpointBars');

  container.innerHTML = sorted.map(([ep, count]) => {
    const [method, ...rest] = ep.split(' ');
    const path = rest.join(' ');
    const pct = (count / max) * 100;
    return `
      <div class="bar-row">
        <span class="bar-label">
          <span class="method-badge method-${method}">${method}</span>${path}
        </span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span class="bar-count">${count}</span>
      </div>`;
  }).join('');
}

/* ---- main poll loop ---- */
async function poll() {
  const errors = [];

  let weekly, range, usage;
  try { weekly = await json(NPM_WEEKLY); } catch (e) { errors.push('NPM weekly: ' + e.message); }
  try { range  = await json(NPM_RANGE);  } catch (e) { errors.push('NPM range: ' + e.message); }
  try { usage  = await json(API_USAGE);  } catch (e) { errors.push('API usage: ' + e.message); }

  if (errors.length) {
    $('lastUpdate').textContent = errors.join(' | ');
    $('lastUpdate').style.color = '#f87171';
    if (weekly || range || usage) { /* partial success, continue */ }
    else return;
  }

  if (weekly) {
    $('weeklyDl').textContent = weekly.downloads.toLocaleString();
    $('weeklyRange').textContent = `${weekly.start} → ${weekly.end}`;
  }
  if (range) {
    const monthTotal = range.downloads.reduce((s, d) => s + d.downloads, 0);
    $('monthlyDl').textContent = monthTotal.toLocaleString();
    $('monthlyRange').textContent = `${range.start} → ${range.end}`;
    renderSpark(range.downloads);
  }
  if (usage) {
    const filtered = Object.fromEntries(
      Object.entries(usage.data.endpoints).filter(([ep]) => !ep.includes('/admin/'))
    );
    const total = Object.values(filtered).reduce((s, n) => s + n, 0);
    $('totalApi').textContent = total.toLocaleString();
    const epCount = Object.keys(filtered).length;
    $('endpointCount').textContent = `across ${epCount} endpoints`;
    renderBars(filtered);
  }

  if (!errors.length) {
    $('lastUpdate').textContent = `updated ${new Date().toLocaleTimeString()}`;
    $('lastUpdate').style.color = '';
  }
}

poll();
setInterval(poll, POLL_MS);
</script>
</body>
</html>
